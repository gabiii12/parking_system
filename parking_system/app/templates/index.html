<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="refresh" content="3">

    <title>Parking Logs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f8fa;
            padding: 40px;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #007bff;
            color: white;
        }
        tr:hover {
            background: #f1f1f1;
        }
        .entry { color: green; font-weight: bold; }
        .exit { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🚗 Parking Logs</h1>
    <table>
        <tr>
            <th>Card UID</th>
            <th>Employee Name</th>
            <th>Vehicle Plate</th>
            <th>Last Action</th>
            <th>Time</th>
        </tr>
        {% for row in logs %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td class="{{ 'entry' if row[3] == 'ENTRY' else 'exit' }}">{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
